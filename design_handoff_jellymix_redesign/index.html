<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JellyMix · Prototipo</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Baloo+2:wght@500;700;800&family=Sniglet:wght@400;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="themes.js"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="jelly.jsx"></script>
<script type="text/babel" src="screens-shared.jsx"></script>
<script type="text/babel" src="screens-splash-map.jsx"></script>
<script type="text/babel" src="screens-game.jsx"></script>
<script type="text/babel" src="screens-shop-collection.jsx"></script>
<script type="text/babel" src="screens-events.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

</head>
<body style="font-size: 16px">
<div id="root"></div>

<script type="text/babel">
  // Wait for all components to be loaded (Babel transpiles async),
  // then mount.
  const tryMount = () => {
    if (window.App && window.JellyBlob && window.SplashScreen && window.MapScreen
        && window.GameScreen && window.ShopScreen && window.CollectionScreen
        && window.EventsScreen
        && window.TweaksPanel && window.useTweaks) {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    } else {
      setTimeout(tryMount, 30);
    }
  };
  tryMount();
</script>
</body>
</html>
