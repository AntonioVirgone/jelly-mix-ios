name: iOS Unit Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Build & Test – iOS Simulator
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Seleziona Xcode (ultima versione stabile)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Versione Xcode attiva
        run: xcodebuild -version

      # Cache della derived data per velocizzare le build successive
      - name: Cache Derived Data
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: derived-data-${{ runner.os }}-${{ hashFiles('**/*.pbxproj') }}
          restore-keys: |
            derived-data-${{ runner.os }}-

      - name: Installa xcpretty
        run: gem install xcpretty --no-document

      - name: Esegui Unit Test
        run: |
          set -o pipefail
          xcodebuild test \
            -project JellyMix.xcodeproj \
            -scheme JellyMix \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
          | xcpretty --report junit --output test-report.xml

      - name: Upload risultati test
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.run_number }}
          path: |
            TestResults.xcresult
            test-report.xml
          retention-days: 14

      - name: Pubblica risultati su GitHub (summary)
        if: always()
        run: |
          if [ -f test-report.xml ]; then
            echo "## Test Results" >> $GITHUB_STEP_SUMMARY
            python3 - <<'EOF'
          import xml.etree.ElementTree as ET, sys
          tree = ET.parse("test-report.xml")
          root = tree.getroot()
          total = int(root.attrib.get("tests", 0))
          failures = int(root.attrib.get("failures", 0))
          errors = int(root.attrib.get("errors", 0))
          passed = total - failures - errors
          icon = "✅" if failures == 0 and errors == 0 else "❌"
          print(f"{icon} **{passed}/{total}** test passati", flush=True)
          if failures > 0:
              print(f"\n⚠️  {failures} falliti", flush=True)
          EOF
          fi
